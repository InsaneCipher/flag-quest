<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Quest — World Atlas Quiz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c12;--land:#1e3a5f;--land-area-lo:#0d2a1a;--land-area-hi:#1a6e3a;
  --land-hover:#3a6ea8;--land-correct:#1a7a3a;--land-wrong:#7a1a1a;
  --border:rgba(100,160,255,.22);--text:#c8d8f0;--accent:#6aabf7;--accent2:#a8d4ff;
  --dim:#3a5070;--panel:rgba(8,12,18,.92);--card:rgba(14,22,45,.75);--cb:rgba(100,150,255,.12)
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Space Mono',monospace;color:var(--text)}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 30% 40%,rgba(20,40,80,.6) 0%,transparent 55%),
             radial-gradient(ellipse at 75% 65%,rgba(10,25,60,.5) 0%,transparent 50%)}
#stars canvas{position:absolute;inset:0}

/* ── LAYOUT ── */
#app{position:relative;z-index:1;width:100%;height:100%;display:grid;
  grid-template-columns:260px 1fr 260px;grid-template-rows:auto 1fr}

/* ── HEADER ── */
header{grid-column:1/-1;padding:10px 24px;border-bottom:1px solid rgba(100,150,255,.12);
  display:flex;align-items:center;gap:16px;backdrop-filter:blur(6px);background:rgba(8,12,22,.5)}
header h1{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;
  color:var(--accent2);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}

/* Mode toggle */
.hdr-grp{display:flex;background:rgba(10,20,50,.6);border:1px solid rgba(100,150,255,.15);
  border-radius:6px;padding:3px;gap:3px}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border:none;border-radius:4px;
  font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;background:transparent;color:var(--dim);white-space:nowrap}
.hdr-btn:hover{color:var(--text);background:rgba(100,150,255,.08)}
.hdr-btn.active{background:rgba(106,171,247,.15);color:var(--accent2);box-shadow:inset 0 0 0 1px rgba(106,171,247,.25)}

/* Global timer (countdown) */
#global-timer-wrap{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
#global-timer-label{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)}
#global-timer{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;
  color:var(--accent2);letter-spacing:.05em;min-width:60px;text-align:right;transition:color .3s}
#global-timer.warn{color:#c8843a}
#global-timer.danger{color:#c83a3a}

/* ── LEFT PANEL ── */
#left-panel{border-right:1px solid rgba(100,150,255,.1);background:var(--panel);
  backdrop-filter:blur(8px);display:flex;flex-direction:column;padding:20px 16px;gap:16px}

/* Lives */
#lives-wrap{display:flex;flex-direction:column;gap:8px}
.plabel{font-size:.52rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
#hearts{display:flex;gap:6px;font-size:1.4rem}
.heart{transition:all .3s;display:inline-block}
.heart.lost{filter:grayscale(1);opacity:.3}

/* Score */
#score-wrap{display:flex;flex-direction:column;gap:4px}
#score{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:600;color:var(--accent2);line-height:1}
.score-delta{position:absolute;font-size:.9rem;color:#4eb87a;font-weight:700;
  animation:floatUp .9s ease-out forwards;pointer-events:none}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}

/* Round counter */
#round-info{font-size:.65rem;color:var(--dim);letter-spacing:.08em}

/* Last result */
#last-result{min-height:2rem;font-size:.72rem;letter-spacing:.05em;padding:8px 10px;
  border-radius:4px;border:1px solid transparent;transition:all .4s}
#last-result.correct{background:rgba(30,110,60,.2);border-color:rgba(78,184,122,.3);color:#4eb87a}
#last-result.wrong{background:rgba(110,30,30,.2);border-color:rgba(184,78,78,.3);color:#c87878}
#last-result.timeout{background:rgba(100,80,20,.2);border-color:rgba(180,140,50,.3);color:#c8a050}

/* ── GLOBE ── */
#globe-wrap{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
body.mode-rotate #globe-svg{cursor:grab}
body.mode-rotate #globe-svg:active{cursor:grabbing}
body.mode-select #globe-svg{cursor:crosshair}
#globe-svg{filter:drop-shadow(0 0 50px rgba(30,80,180,.4)) drop-shadow(0 0 100px rgba(10,40,120,.3))}
.graticule{fill:none;stroke:rgba(80,120,200,.07);stroke-width:.5}
.sphere-rim{fill:none;stroke:rgba(100,160,255,.18);stroke-width:1.5}
.atmosphere{fill:none;stroke:rgba(80,140,255,.1);stroke-width:10}
.country{stroke:var(--border);stroke-width:.4;transition:fill .2s}
.country:hover{opacity:.85}
.country.flash-correct{fill:#1a7a3a !important;transition:fill 0s}
.country.flash-wrong{fill:#7a1a1a !important;transition:fill 0s}
#quiz-flash{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .35s}

/* ── TURN TIMER BAR ── */
#turn-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:5px;background:rgba(10,20,50,.5)}
#turn-bar{height:100%;width:100%;border-radius:0;transition:width .25s linear,background-color .3s}
#turn-bar.ok{background:var(--accent)}
#turn-bar.half{background:#c8843a}
#turn-bar.low{background:#c83a3a}

/* ── RIGHT PANEL ── */
#right-panel{border-left:1px solid rgba(100,150,255,.1);background:var(--panel);
  backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px 20px;gap:20px}

/* Flag display */
#flag-display{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
#flag-emoji{font-size:5rem;line-height:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}
#flag-country-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;
  color:var(--accent2);text-align:center;min-height:2rem;opacity:0;transition:opacity .5s;letter-spacing:.04em}
#flag-country-name.revealed{opacity:1}
#flag-hint{font-size:.6rem;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;text-align:center}

/* Divider */
.panel-divider{width:100%;height:1px;background:rgba(100,150,255,.1)}

/* Coords */
.coords-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%}
.coord-box{background:var(--card);border:1px solid var(--cb);border-radius:4px;padding:7px 10px}
.c-label{font-size:.5rem;letter-spacing:.1em;color:var(--dim);margin-bottom:2px}
.c-val{font-size:.78rem;color:var(--accent)}

/* High score */
#hi-score-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%}
#hi-score-val{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--dim)}

/* ── TOOLTIP ── */
#tooltip{position:fixed;background:rgba(8,14,30,.92);border:1px solid rgba(100,160,255,.2);
  border-radius:3px;padding:4px 10px;font-size:.7rem;color:var(--accent2);pointer-events:none;
  opacity:0;transition:opacity .1s;letter-spacing:.04em;backdrop-filter:blur(8px);z-index:100}

/* ── START / GAME OVER SCREEN ── */
#overlay-screen{position:absolute;inset:0;z-index:300;background:rgba(8,12,18,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  backdrop-filter:blur(12px)}
#overlay-screen h2{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;
  color:var(--accent2);letter-spacing:.15em;text-align:center}
#overlay-screen .sub{font-size:.72rem;color:var(--dim);letter-spacing:.12em;text-align:center;max-width:320px;line-height:1.8}
.big-btn{padding:14px 40px;background:rgba(106,171,247,.12);border:1px solid rgba(106,171,247,.3);
  border-radius:6px;font-family:'Space Mono',monospace;font-size:.8rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--accent2);cursor:pointer;transition:all .2s}
.big-btn:hover{background:rgba(106,171,247,.22);border-color:rgba(106,171,247,.5)}
#gameover-score{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:600;color:var(--accent2)}
#gameover-hi{font-size:.68rem;color:var(--dim);letter-spacing:.1em}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:400;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px}
#loading h2{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:300;color:var(--accent2);letter-spacing:.18em}
#loading p{font-size:.62rem;color:var(--dim);letter-spacing:.12em}
.spinner{width:34px;height:34px;border:2px solid rgba(100,160,255,.15);border-top-color:var(--accent);
  border-radius:50%;animation:spin .85s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(106,171,247,.2);border-radius:2px}
</style>
</head>
<body>
<div id="stars"><canvas id="star-canvas"></canvas></div>

<div id="loading">
  <div class="spinner"></div>
  <h2>Flag Quest</h2>
  <p>Loading world data…</p>
</div>

<div id="app" style="opacity:0;transition:opacity .5s">
  <header>
    <h1>Flag Quest</h1>

    <div class="hdr-grp">
      <button class="hdr-btn active" id="btn-rotate" onclick="setMode('rotate')">⟳ Rotate</button>
      <button class="hdr-btn" id="btn-select" onclick="setMode('select')">⊕ Select</button>
    </div>

    <div id="global-timer-wrap">
      <span id="global-timer-label">Time Left</span>
      <span id="global-timer">5:00</span>
    </div>
  </header>

  <!-- LEFT: lives + score -->
  <div id="left-panel">
    <div id="lives-wrap">
      <div class="plabel">Lives</div>
      <div id="hearts">
        <span class="heart" id="h0">❤️</span>
        <span class="heart" id="h1">❤️</span>
        <span class="heart" id="h2">❤️</span>
        <span class="heart" id="h3">❤️</span>
        <span class="heart" id="h4">❤️</span>
      </div>
    </div>

    <div id="score-wrap">
      <div class="plabel">Score</div>
      <div style="position:relative;display:inline-block">
        <div id="score">0</div>
      </div>
    </div>

    <div id="round-info" class="plabel">Round 1</div>

    <div id="last-result"></div>

    <div style="margin-top:auto">
      <div id="hi-score-wrap">
        <div class="plabel">Best Score</div>
        <div id="hi-score-val">0</div>
      </div>
    </div>
  </div>

  <!-- GLOBE -->
  <div id="globe-wrap">
    <svg id="globe-svg"></svg>
    <div id="turn-bar-wrap"><div id="turn-bar" class="ok"></div></div>
    <div id="quiz-flash"></div>
  </div>

  <!-- RIGHT: flag + hint -->
  <div id="right-panel">
    <div id="flag-display">
      <div class="plabel">Find this country</div>
      <div id="flag-emoji">🌍</div>
      <div id="flag-country-name"></div>
      <div id="flag-hint">Name revealed at 30s</div>
    </div>

    <div class="panel-divider"></div>

    <div class="coords-row">
      <div class="coord-box"><div class="c-label">Longitude</div><div class="c-val" id="c-lon">—</div></div>
      <div class="coord-box"><div class="c-label">Latitude</div><div class="c-val" id="c-lat">—</div></div>
    </div>
  </div>

  <!-- START / GAME OVER overlay (lives inside globe-wrap) -->
  <div id="overlay-screen" style="grid-column:1/-1;grid-row:2">
    <h2 id="overlay-title">Flag Quest</h2>
    <div class="sub" id="overlay-sub">Spin the globe to find countries from their flags.<br>You have 5 lives and 5 minutes. Faster answers score more!</div>
    <div id="gameover-score" style="display:none"></div>
    <div id="gameover-hi" style="display:none"></div>
    <button class="big-btn" id="start-btn" onclick="startGame()">▶ Start Game</button>
  </div>
</div>

<div id="tooltip"></div>

<script>

  const c=document.getElementById('star-canvas'),ctx=c.getContext('2d');let S=[];
  const resize=()=>{c.width=innerWidth;c.height=innerHeight;};
  const init=()=>{S=Array.from({length:240},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.1,a:Math.random()*.7+.1,d:(Math.random()-.5)*.013}));};
  const draw=()=>{ctx.clearRect(0,0,c.width,c.height);S.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,210,255,${s.a})`;ctx.fill();s.a+=s.d;if(s.a>.8||s.a<.05)s.d*=-1;});requestAnimationFrame(draw);};
  window.addEventListener('resize',()=>{resize();init();});resize();init();draw();
})();

// ═══════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════
let width,height,radius,projection,path,svg,dragSurface;
let mode='rotate';
let worldData=null,topoC=null,topoB=null;
let areaScale=null; // for area coloring
const tooltip=document.getElementById('tooltip');
const cLon=document.getElementById('c-lon'),cLat=document.getElementById('c-lat');

// Game state
let lives=5, score=0, round=0;
let globalSecs=300;    // 5 minutes countdown
let turnSecs=0;        // counts up to 60
let turnMax=60;
let nameRevealed=false;
let quizTarget=null;   // current feature
let gameRunning=false;
let globalTimerID=null, turnTimerID=null;
let hiScore=parseInt(localStorage.getItem('fq-hi')||'0');

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function flag(a2){
  if(!a2)return'🏳️';
  return[...a2.toUpperCase()].map(c=>String.fromCodePoint(0x1F1E6-65+c.charCodeAt(0))).join('');
}
function nid(id){return String(id).padStart(3,'0');}
function fmt(s){const m=Math.floor(s/60);const sc=s%60;return`${m}:${String(sc).padStart(2,'0')}`;}

// ═══════════════════════════════════════
// MODE
// ═══════════════════════════════════════
function setMode(m){
  mode=m;
  document.body.className='mode-'+m;
  document.getElementById('btn-rotate').classList.toggle('active',m==='rotate');
  document.getElementById('btn-select').classList.toggle('active',m==='select');
  if(dragSurface) dragSurface.style('pointer-events',m==='rotate'?'all':'none');
}

// ═══════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════
function startGame(){
  document.getElementById('overlay-screen').style.display='none';
  lives=5; score=0; round=0; globalSecs=300;
  updateHearts(); updateScore(); updateRound();
  document.getElementById('global-timer').textContent=fmt(globalSecs);
  document.getElementById('global-timer').className='';
  document.getElementById('last-result').textContent='';
  document.getElementById('last-result').className='';
  document.getElementById('hi-score-val').textContent=hiScore;
  gameRunning=true;
  setMode('select');
  startGlobalTimer();
  nextQuestion();
}

function startGlobalTimer(){
  clearInterval(globalTimerID);
  globalTimerID=setInterval(()=>{
    if(!gameRunning)return;
    globalSecs--;
    const el=document.getElementById('global-timer');
    el.textContent=fmt(globalSecs);
    if(globalSecs<=60) el.className='danger';
    else if(globalSecs<=120) el.className='warn';
    if(globalSecs<=0){ clearInterval(globalTimerID); endGame('timeout'); }
  },1000);
}

function startTurnTimer(){
  clearInterval(turnTimerID);
  turnSecs=0; nameRevealed=false;
  document.getElementById('flag-country-name').textContent='';
  document.getElementById('flag-country-name').classList.remove('revealed');
  document.getElementById('flag-hint').textContent='Name revealed at 30s';
  updateBar();
  turnTimerID=setInterval(()=>{
    if(!gameRunning)return;
    turnSecs++;
    updateBar();
    // Reveal name at half time
    if(turnSecs>=turnMax/2 && !nameRevealed){
      nameRevealed=true;
      const id=nid(quizTarget.id);
      document.getElementById('flag-country-name').textContent=NAMES[id]||'';
      document.getElementById('flag-country-name').classList.add('revealed');
      document.getElementById('flag-hint').textContent='';
    }
    if(turnSecs>=turnMax){
      clearInterval(turnTimerID);
      loseLife('timeout');
    }
  },1000);
}

function updateBar(){
  const bar=document.getElementById('turn-bar');
  const pct=Math.max(0,100-(turnSecs/turnMax)*100);
  bar.style.width=pct+'%';
  if(pct>60) bar.className='ok';
  else if(pct>25) bar.className='half';
  else bar.className='low';
}

function nextQuestion(){
  if(!topoC||!gameRunning) return;
  clearInterval(turnTimerID);
  const valid=topoC.features.filter(f=>NAMES[nid(f.id)]&&A2[nid(f.id)]);
  quizTarget=valid[Math.floor(Math.random()*valid.length)];
  round++;
  updateRound();

  const id=nid(quizTarget.id),a2=A2[id];
  document.getElementById('flag-emoji').textContent=flag(a2);
  document.getElementById('flag-country-name').textContent='';
  document.getElementById('flag-country-name').classList.remove('revealed');
  document.getElementById('flag-hint').textContent='Name revealed at 30s';

  // Spin to rough region with jitter
  const c=d3.geoCentroid(quizTarget);
  const jitter=[(Math.random()-.5)*80,(Math.random()-.5)*40];
  const cur=projection.rotate(),target=[-c[0]+jitter[0],-c[1]+jitter[1]];
  d3.transition().duration(750).ease(d3.easeCubicInOut)
    .tween('rot',()=>t=>{projection.rotate(d3.interpolate(cur,target)(t));redraw();})
    .on('end',()=>startTurnTimer());
}

function handleClick(d){
  if(!gameRunning||!quizTarget) return;
  if(d.id===quizTarget.id){
    correctAnswer();
  } else {
    wrongAnswer(d);
  }
}

function correctAnswer(){
  clearInterval(turnTimerID);
  const pts=calcPoints();
  score+=pts;
  globalSecs=Math.min(globalSecs+10,300); // +10s bonus, cap at 5 min
  updateScore(pts);
  updateRound();
  const name=NAMES[nid(quizTarget.id)]||'?';
  showResult('correct',`✓ ${name} · +${pts} pts · +10s`);
  flashCountry(quizTarget.id,'flash-correct');
  flashGlobe('#0d3a20');
  if(score>hiScore){ hiScore=score; localStorage.setItem('fq-hi',hiScore); document.getElementById('hi-score-val').textContent=hiScore; }
  setTimeout(nextQuestion,1200);
}

function wrongAnswer(d){
  clearInterval(turnTimerID);
  const wrongName=NAMES[nid(d.id)]||'?';
  const rightName=NAMES[nid(quizTarget.id)]||'?';
  showResult('wrong',`✕ That's ${wrongName} — was ${rightName}`);
  flashCountry(d.id,'flash-wrong');
  flashCountry(quizTarget.id,'flash-correct');
  flashGlobe('#3a0d0d');
  loseLife('wrong');
}

function loseLife(reason){
  lives=Math.max(0,lives-1);
  updateHearts();
  if(reason==='timeout'){
    const name=NAMES[nid(quizTarget.id)]||'?';
    showResult('timeout',`⏱ Time's up — was ${name}`);
    flashCountry(quizTarget.id,'flash-correct');
  }
  if(lives<=0){ setTimeout(()=>endGame('lives'),1000); return; }
  setTimeout(nextQuestion,1400);
}

function calcPoints(){
  // Max 100 pts at t=0, scales down to 10 at t=60
  return Math.max(10,Math.round(100-((turnSecs/turnMax)*90)));
}

function endGame(reason){
  gameRunning=false;
  clearInterval(globalTimerID);
  clearInterval(turnTimerID);
  setMode('rotate');
  if(score>hiScore){ hiScore=score; localStorage.setItem('fq-hi',hiScore); }
  document.getElementById('overlay-title').textContent='Game Over';
  const sub=reason==='timeout'?'The 5-minute timer ran out!':reason==='lives'?'You ran out of lives!':'Game over!';
  document.getElementById('overlay-sub').textContent=sub;
  document.getElementById('gameover-score').style.display='block';
  document.getElementById('gameover-score').textContent=score;
  document.getElementById('gameover-hi').style.display='block';
  document.getElementById('gameover-hi').textContent=`Best: ${hiScore}`;
  document.getElementById('start-btn').textContent='▶ Play Again';
  document.getElementById('overlay-screen').style.display='flex';
}

function showResult(type,msg){
  const el=document.getElementById('last-result');
  el.textContent=msg; el.className=type;
}

function updateHearts(){
  for(let i=0;i<5;i++){
    document.getElementById('h'+i).classList.toggle('lost',i>=lives);
  }
}

function updateScore(delta){
  document.getElementById('score').textContent=score;
  if(delta){
    const wrap=document.querySelector('#score-wrap div[style]');
    const d=document.createElement('div');
    d.className='score-delta'; d.textContent='+'+delta;
    d.style.top='-10px'; d.style.left='0';
    wrap.appendChild(d);
    setTimeout(()=>d.remove(),950);
  }
}

function updateRound(){
  document.getElementById('round-info').textContent=`Round ${round}`;
}

function flashCountry(id,cls){
  const el=d3.select('#c'+id);
  el.classed(cls,true);
  setTimeout(()=>el.classed(cls,false),1200);
}

function flashGlobe(col){
  const f=document.getElementById('quiz-flash');
  f.style.background=col; f.style.opacity='.25';
  setTimeout(()=>f.style.opacity='0',380);
}

// ═══════════════════════════════════════
// AREA COLOUR SCALE
// ═══════════════════════════════════════
function buildAreaScale(){
  const areas={};
  topoC.features.forEach(f=>{areas[f.id]=d3.geoArea(f);});
  const vals=Object.values(areas).filter(v=>v>0);
  const sc=d3.scaleSequentialLog(d3.interpolate('#0d2a1a','#1a6e3a')).domain([d3.min(vals),d3.max(vals)]);
  areaScale={map:areas,sc};
}

function applyAreaColours(){
  if(!areaScale) return;
  svg.selectAll('path.country').each(function(d){
    const v=areaScale.map[d.id];
    if(v>0) d3.select(this).style('fill',areaScale.sc(v));
    else d3.select(this).style('fill','var(--land)');
  });
}

// ═══════════════════════════════════════
// GLOBE INIT
// ═══════════════════════════════════════
async function init(){
  let world;
  try{
    world=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  }catch(e){
    document.getElementById('loading').innerHTML='<div style="color:#6aabf7;text-align:center;font-family:monospace"><div style="font-size:2rem">⚠</div><div>Could not load map data.</div></div>';
    return;
  }
  worldData=world;
  topoC=topojson.feature(world,world.objects.countries);
  topoB=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);

  const{w,h,r}=getSize();
  width=w;height=h;radius=r;
  projection=d3.geoOrthographic().scale(r).translate([w/2,h/2]).clipAngle(90).precision(.3).rotate([0,-20,0]);
  path=d3.geoPath(projection);
  svg=d3.select('#globe-svg').attr('width',w).attr('height',h);

  // Defs
  const defs=svg.append('defs');
  const ag=defs.append('radialGradient').attr('id','ag').attr('cx','50%').attr('cy','45%');
  ag.append('stop').attr('offset','60%').attr('stop-color','rgba(10,30,80,0)');
  ag.append('stop').attr('offset','100%').attr('stop-color','rgba(40,100,220,.18)');
  const og=defs.append('radialGradient').attr('id','og').attr('cx','38%').attr('cy','35%');
  og.append('stop').attr('offset','0%').attr('stop-color','#1a3a70');
  og.append('stop').attr('offset','100%').attr('stop-color','#050d1c');

  svg.append('circle').attr('id','sphere-bg').attr('cx',w/2).attr('cy',h/2).attr('r',r)
    .style('fill','url(#og)').style('pointer-events','none');

  dragSurface=svg.append('circle').attr('id','drag-surface').attr('cx',w/2).attr('cy',h/2).attr('r',r)
    .style('fill','transparent').style('stroke','none');

  svg.append('path').attr('class','graticule').attr('id','grat')
    .attr('d',path(d3.geoGraticule()())).style('pointer-events','none');

  buildAreaScale();

  const cg=svg.append('g').attr('id','country-g');
  cg.selectAll('path.country').data(topoC.features).enter().append('path')
    .attr('class','country').attr('d',path).attr('id',d=>'c'+d.id)
    .on('mouseenter',function(ev,d){
      tooltip.style.opacity= gameRunning ? '0' : '1'; // hide tooltip during game to reduce cheating
      tooltip.textContent=NAMES[nid(d.id)]||'Country '+d.id;
    })
    .on('mousemove',function(ev){
      tooltip.style.left=(ev.clientX+14)+'px';tooltip.style.top=(ev.clientY-28)+'px';
      const co=projection.invert([ev.offsetX,ev.offsetY]);
      if(co){cLon.textContent=co[0].toFixed(2)+'°';cLat.textContent=co[1].toFixed(2)+'°';}
    })
    .on('mouseleave',()=>tooltip.style.opacity='0')
    .on('click',function(ev,d){
      if(mode!=='select')return;
      ev.stopPropagation();
      if(gameRunning) handleClick(d);
    });

  svg.append('path').attr('id','borders').datum(topoB)
    .attr('fill','none').attr('stroke','rgba(100,160,255,.18)').attr('stroke-width',.35)
    .attr('d',path).style('pointer-events','none');

  svg.append('circle').attr('class','atmosphere').attr('id','ac').attr('cx',w/2).attr('cy',h/2).attr('r',r+5).style('pointer-events','none');
  svg.append('circle').attr('class','sphere-rim').attr('id','rc').attr('cx',w/2).attr('cy',h/2).attr('r',r).style('pointer-events','none');
  svg.append('circle').attr('id','gc').attr('cx',w/2).attr('cy',h/2).attr('r',r).style('fill','url(#ag)').style('pointer-events','none');

  applyAreaColours();
  setMode('rotate');

  // Drag
  let ds=null,rs=null,vel=[0,0],lp=null,af=null;
  const drag=d3.drag()
    .on('start',ev=>{if(af)cancelAnimationFrame(af);ds=[ev.x,ev.y];rs=projection.rotate();lp=[ev.x,ev.y];vel=[0,0];})
    .on('drag',ev=>{
      const dx=ev.x-ds[0],dy=ev.y-ds[1];
      projection.rotate([rs[0]+dx*.35,rs[1]-dy*.35,projection.rotate()[2]]);
      vel=[ev.x-lp[0],ev.y-lp[1]];lp=[ev.x,ev.y];redraw();
    })
    .on('end',()=>{
      function mo(){vel[0]*=.94;vel[1]*=.94;if(Math.abs(vel[0])<.02&&Math.abs(vel[1])<.02)return;
        const r=projection.rotate();projection.rotate([r[0]+vel[0]*.35,r[1]-vel[1]*.35,r[2]]);redraw();af=requestAnimationFrame(mo);}
      af=requestAnimationFrame(mo);
    });
  dragSurface.call(drag);

  svg.on('wheel',ev=>{
    ev.preventDefault();
    const s=projection.scale();
    projection.scale(Math.min(Math.max(s*(ev.deltaY>0?.9:1.1),radius*.5),radius*8));
    redraw();
  });

  window.addEventListener('resize',()=>{
    const{w,h}=getSize();width=w;height=h;
    svg.attr('width',w).attr('height',h);
    projection.translate([w/2,h/2]);
    circles();redraw();
  });

  document.getElementById('hi-score-val').textContent=hiScore;
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.opacity='1';
}

function getSize(){
  const el=document.getElementById('globe-wrap');
  return{w:el.clientWidth,h:el.clientHeight,r:Math.min(el.clientWidth,el.clientHeight)*.44};
}

function circles(){
  const s=projection.scale(),[cx,cy]=projection.translate();
  ['sphere-bg','drag-surface'].forEach(id=>svg.select('#'+id).attr('cx',cx).attr('cy',cy).attr('r',s));
  svg.select('#ac').attr('cx',cx).attr('cy',cy).attr('r',s+5);
  ['rc','gc'].forEach(id=>svg.select('#'+id).attr('cx',cx).attr('cy',cy).attr('r',s));
}

function redraw(){
  path=d3.geoPath(projection);
  svg.select('#grat').attr('d',path(d3.geoGraticule()()));
  svg.selectAll('path.country').attr('d',path);
  svg.select('#borders').attr('d',path(topoB));
  circles();
  applyAreaColours();
  // re-apply flash classes (they're transient so just keep them)
}

init();
</script>
</body>
</html>
